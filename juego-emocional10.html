<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Demo Impacto - Juego Emocional</title>
<style>
body{margin:0;background:#0f172a;font-family:Arial;color:#fff;display:flex;justify-content:center}
#game{width:1000px;height:600px;background:url('aula.png') center/cover no-repeat;position:relative;overflow:hidden;border-radius:12px}

.player, .npc{
position:absolute;width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;
transition:all .2s;
}
.player{background:#22c55e;}
.npc{background:#ef4444;}

#hud{
position:absolute;top:10px;left:10px;background:#fff;color:#000;padding:8px;border-radius:8px;font-weight:bold
}

#hint{
position:absolute;bottom:120px;left:50%;transform:translateX(-50%);
background:#fff;color:#000;padding:8px;border-radius:8px;display:none;font-weight:bold
}

#dialog{
position:absolute;bottom:0;width:100%;background:rgba(0,0,0,0.85);padding:20px;display:none
}

button{margin:6px;padding:10px 14px;font-weight:bold;border:none;border-radius:8px;cursor:pointer}

.good{background:#22c55e;color:#fff}
.mid{background:#f59e0b;color:#fff}
.bad{background:#ef4444;color:#fff}

#feedback{
margin-top:10px;font-size:18px;font-weight:bold
}

#result{
position:absolute;top:0;left:0;width:100%;height:100%;display:none;
background:rgba(0,0,0,0.8);align-items:center;justify-content:center;font-size:24px;text-align:center;padding:40px
}
</style>
</head>

<body>

<div id="game">

<div id="hud">Misión: Resuelve el conflicto</div>

<div id="hint">Presiona E para interactuar</div>

<div id="player" class="player" style="left:200px;top:400px;">Tú</div>
<div id="npc" class="npc" style="left:600px;top:400px;">😠</div>

<div id="dialog">
<b>Tu compañero está molesto</b><br><br>
¿Qué haces?<br>
<button class="good" onclick="accion('calma')">Hablar con calma</button>
<button class="mid" onclick="accion('explicar')">Pedir explicación</button>
<button class="bad" onclick="accion('gritar')">Responder molesto</button>

<div id="feedback"></div>
</div>

<div id="result"></div>

</div>

<script>

let player = document.getElementById("player");
let npc = document.getElementById("npc");
let dialog = document.getElementById("dialog");
let hint = document.getElementById("hint");
let feedback = document.getElementById("feedback");
let result = document.getElementById("result");

let keys = {};
let speed = 0;
let vel = 0;

document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

function loop(){
let x = player.offsetLeft;
let y = player.offsetTop;

if(keys["ArrowRight"]||keys["d"]) vel = 4;
if(keys["ArrowLeft"]||keys["a"]) vel = -4;

vel *= 0.9;
x += vel;

player.style.left = x+"px";

let dist = Math.hypot(x-npc.offsetLeft, y-npc.offsetTop);

if(dist < 100){
hint.style.display="block";
if(keys["e"]) abrir();
}else{
hint.style.display="none";
}

requestAnimationFrame(loop);
}
loop();

function abrir(){
dialog.style.display="block";
}

function accion(tipo){

feedback.style.display="block";

if(tipo==="calma"){
feedback.innerHTML="La tensión baja";
npc.style.background="#22c55e";
npc.innerHTML="🙂";
}

if(tipo==="explicar"){
feedback.innerHTML="Se estabiliza la situación";
npc.style.background="#f59e0b";
npc.innerHTML="😐";
}

if(tipo==="gritar"){
feedback.innerHTML="El conflicto empeora";
npc.style.background="#ef4444";
npc.innerHTML="😡";
}

setTimeout(()=>{
dialog.style.display="none";
mostrarResultado(tipo);
},1500);

}

function mostrarResultado(tipo){

result.style.display="flex";

if(tipo==="calma"){
result.innerHTML="Excelente manejo emocional<br><br>✔ Resolviste el conflicto";
}
if(tipo==="explicar"){
result.innerHTML="Resultado intermedio<br><br>⚠ Puede mejorar";
}
if(tipo==="gritar"){
result.innerHTML="Manejo inadecuado<br><br>❌ El conflicto escaló";
}

}

</script>

</body>
</html>
