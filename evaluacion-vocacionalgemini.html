<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>FFFULTIMAultimVVHEvaluación Orientación Vocacional</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #111827;
      background: #ffffff;
      --sbw: 0px;

    }

    /* ===== FIX #1: evita que el ancho “salte” por aparición/desaparición del scroll ===== */
html{
  overflow-y: scroll;          /* reserva SIEMPRE */
  scrollbar-gutter: stable;    /* (opcional) */
  padding-right: var(--sbw);

}

body { overflow-y: scroll; 
    margin: 0;
  padding: 0;
  background: #fff;
  font-size: 16px;
  overflow-x: hidden;
}




    .layout {
      display: grid;
      grid-template-columns: 80px minmax(0, 1fr);
      min-height: 100vh;
    }
.side-strip {
  background: #e5e7eb;
  border-right: 1px solid #cbd5e1;
  display: flex;
  align-items: center;
  justify-content: center;
}

.side-strip span {
  writing-mode: vertical-rl;
  text-orientation: mixed;
  transform: rotate(180deg);
  font-weight: 700;
  color: #64748b;
  letter-spacing: 2px;
  text-transform: uppercase;
  font-size: 0.9rem;
}

    .content-area {
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .header {
      padding: 20px 40px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand {
      font-size: 1.1rem;
      font-weight: 700;
      color: #111827;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .main-view {
      flex: 1;
      padding: 40px;
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
      box-sizing: border-box;
    }

    .hidden {
      display: none !important;
    }

    /* Pantalla Identificación */
    #pantalla-identificacion {
      text-align: center;
      margin-top: 50px;
    }

    .form-group {
      margin: 20px 0;
      text-align: left;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 1rem;
    }

    .btn-primary {
      background: #2563eb;
      color: #fff;
      padding: 12px 24px;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      font-size: 1rem;
    }

    .btn-primary:hover {
      background: #1d4ed8;
    }

    /* Progreso */
    .progreso-container {
      margin-bottom: 30px;
    }

    .progreso-info {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .progreso-bar-bg {
      height: 8px;
      background: #e5e7eb;
      border-radius: 4px;
      overflow: hidden;
    }

    .progreso-bar-fill {
      height: 100%;
      background: #2563eb;
      width: 0%;
      transition: width 0.3s ease;
    }

    /* Preguntas */
    .pregunta-texto {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 30px;
      line-height: 1.3;
    }

    .opciones-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .opcion-card {
      padding: 16px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
    }

    .opcion-card:hover {
      border-color: #2563eb;
      background: #f8fafc;
    }

    .opcion-card.selected {
      border-color: #2563eb;
      background: #eff6ff;
      box-shadow: 0 0 0 1px #2563eb;
    }

    .opcion-circle {
      width: 20px;
      height: 20px;
      border: 2px solid #cbd5e1;
      border-radius: 50%;
      margin-right: 12px;
      flex-shrink: 0;
      position: relative;
    }

    .opcion-card.selected .opcion-circle {
      border-color: #2563eb;
    }

    .opcion-card.selected .opcion-circle::after {
      content: "";
      width: 10px;
      height: 10px;
      background: #2563eb;
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .actions {
      margin-top: 40px;
      display: flex;
      justify-content: flex-end;
    }

    /* Pantalla Final */
    #pantalla-final {
      text-align: center;
      padding: 60px 20px;
    }

    .final-icon {
      font-size: 4rem;
      margin-bottom: 20px;
    }

    /* Loading Spinner */
    .spinner {
      border: 4px solid #f3f4f6;
      border-top: 4px solid #2563eb;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Modal Pre-intro */
    .preintro-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 9999;
      display: none; /* se maneja con JS */
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .preintro-card {
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
      position: relative;
    }
    .preintro-actions {
      margin-top: 24px;
      display: flex;
      justify-content: space-between;
    }
    .preintro-btn {
      padding: 10px 20px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
    }
    .preintro-btn.primary {
      background: #2563eb;
      color: #fff;
      border: none;
    }
    .preintro-btn.secondary {
      background: #f3f4f6;
      color: #374151;
      border: 1px solid #d1d5db;
    }
  </style>
</head>
<body>

  <div class="layout">
    <div class="side-strip">
      <span>EVALUACIÓN VOCACIONAL</span>
    </div>

    <div class="content-area">
      <header class="header">
        <div class="brand">
          Cuestionario de Orientación
        </div>
      </header>

      <main class="main-view">
        
        <!-- Pantalla de Identificación -->
        <section id="pantalla-identificacion">
          <h1 style="font-size: 2rem; margin-bottom: 10px;">Bienvenido</h1>
          <p style="color: #6b7280; margin-bottom: 30px;">Por favor, ingresa tu código de acceso.</p>
          
          <div class="form-group">
            <label for="codigoAcceso">Código de Estudiante</label>
            <input type="text" id="codigoAcceso" placeholder="Ingresa tu código aquí" />
          </div>
          
          <button class="btn-primary" id="btnIniciar">Ingresar</button>
          
          <div id="loading-auth" class="hidden">
            <div class="spinner"></div>
            <p>Verificando código...</p>
          </div>
        </section>

        <!-- Pantalla de Preguntas -->
        <section id="pantalla-preguntas" class="hidden">
          <div class="progreso-container">
            <div class="progreso-info">
              <span id="label-pregunta-actual">Pregunta 1 de 40</span>
              <span id="porcentaje-completado">0%</span>
            </div>
            <div class="progreso-bar-bg">
              <div id="progreso-fill" class="progreso-bar-fill"></div>
            </div>
          </div>

          <div class="pregunta-texto" id="texto-pregunta">
            <!-- Texto inyectado -->
          </div>

          <div class="opciones-container" id="contenedor-opciones">
            <!-- Opciones inyectadas -->
          </div>

          <div class="actions">
            <button class="btn-primary" id="btnSiguiente">Siguiente</button>
          </div>
        </section>

        <!-- Pantalla Final -->
        <section id="pantalla-final" class="hidden">
          <div class="final-icon">✅</div>
          <h2 style="font-size: 2rem; margin-bottom: 16px;">¡Evaluación Completada!</h2>
          <p style="color: #4b5563; font-size: 1.1rem; margin-bottom: 30px;">
            Tus respuestas han sido registradas exitosamente. El equipo de orientación educativa analizará tu perfil.
          </p>
          <button class="btn-primary" id="btnRegresarMenu">Finalizar y Salir</button>
        </section>

      </main>
    </div>
  </div>

  <!-- Firebase & Lógica -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

    // Reemplaza con tus credenciales reales de Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyD-TUS-CREDENTIALS",
      authDomain: "orientacion-88.firebaseapp.com",
      projectId: "orientacion-88",
      storageBucket: "orientacion-88.appspot.com",
      messagingSenderId: "123456789",
      appId: "1:123456789:web:abcdef"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- DATOS DEL CUESTIONARIO (Ahora con 40 preguntas) ---
    const preguntas = [
      { id: 1, texto: "¿Te gusta participar en proyectos de investigación científica?" },
      { id: 2, texto: "¿Disfrutas diseñando estructuras o piezas mecánicas?" },
      { id: 3, texto: "¿Te interesa ayudar a personas en situaciones de vulnerabilidad?" },
      { id: 4, texto: "¿Prefieres trabajar en actividades relacionadas con el arte y la creatividad?" },
      { id: 5, texto: "¿Te atrae la idea de liderar y gestionar equipos de trabajo?" },
      { id: 6, texto: "¿Sientes interés por el análisis de datos financieros y contabilidad?" },
      { id: 7, texto: "¿Te gusta realizar actividades físicas y deportes competitivos?" },
      { id: 8, texto: "¿Te interesa la protección del medio ambiente y la ecología?" },
      { id: 9, texto: "¿Disfrutas escribiendo ensayos, cuentos o artículos de opinión?" },
      { id: 10, texto: "¿Te gustaría aprender idiomas y conocer diferentes culturas?" },
      { id: 11, texto: "¿Te motiva la resolución de problemas lógicos y matemáticos?" },
      { id: 12, texto: "¿Te interesa el funcionamiento del cuerpo humano y la medicina?" },
      { id: 13, texto: "¿Te gusta la organización y planificación de eventos sociales?" },
      { id: 14, texto: "¿Prefieres trabajar en contacto directo con la tecnología y software?" },
      { id: 15, texto: "¿Te interesa el estudio de la historia y el comportamiento social?" },
      { id: 16, texto: "¿Disfrutas reparando objetos eléctricos o electrónicos?" },
      { id: 17, texto: "¿Te gustaría dedicarte a la enseñanza y pedagogía?" },
      { id: 18, texto: "¿Te atrae el mundo de las leyes y la justicia?" },
      { id: 19, texto: "¿Te gusta el marketing y la publicidad de productos?" },
      { id: 20, texto: "¿Disfrutas cocinando y experimentando con la gastronomía?" },
      { id: 21, texto: "¿Te interesa el diseño de interiores y la arquitectura?" },
      { id: 22, texto: "¿Te gusta trabajar en laboratorios químicos?" },
      { id: 23, texto: "¿Te interesa el periodismo y la comunicación masiva?" },
      { id: 24, texto: "¿Te motiva la protección civil y seguridad ciudadana?" },
      { id: 25, texto: "¿Disfrutas del dibujo técnico y la geometría?" },
      { id: 26, texto: "¿Te gustaría trabajar en el sector agropecuario o veterinario?" },
      { id: 27, texto: "¿Te interesa la psicología y el bienestar mental?" },
      { id: 28, texto: "¿Te atrae la producción audiovisual y el cine?" },
      { id: 29, texto: "¿Te gusta el análisis de mercados y la economía global?" },
      { id: 30, texto: "¿Te motiva la defensa de los derechos humanos?" },
      { id: 31, texto: "¿Disfrutas armando rompecabezas o juegos de estrategia?" },
      { id: 32, texto: "¿Te interesa la astronomía y el espacio?" },
      { id: 33, texto: "¿Te gustaría trabajar en turismo y hotelería?" },
      { id: 34, texto: "¿Te atrae el diseño de modas y tendencias?" },
      { id: 35, texto: "¿Disfrutas realizando experimentos caseros?" },
      { id: 36, texto: "¿Te interesa la política y la gestión pública?" },
      // --- NUEVAS PREGUNTAS AGREGADAS (37-40) ---
      { id: 37, texto: "¿Te gusta organizar archivos y mantener sistemas de información ordenados?" },
      { id: 38, texto: "¿Te interesa la ingeniería genética y la biotecnología?" },
      { id: 39, texto: "¿Disfrutas asesorando a otras personas sobre sus finanzas personales?" },
      { id: 40, texto: "¿Te atrae el desarrollo de aplicaciones para dispositivos móviles?" }
    ];

    const opciones = ["Mucho", "Algo", "Poco", "Nada"];

    // --- ESTADO GLOBAL ---
    let indicePregunta = 0;
    let respuestas = {};
    let codigoUsuario = "";

    // --- MANEJO DE PANTALLAS ---
    function mostrarPantallaPreguntas() {
      document.getElementById("pantalla-identificacion").classList.add("hidden");
      document.getElementById("pantalla-preguntas").classList.remove("hidden");
      pintarPregunta();
    }

    function mostrarPantallaFinal() {
      document.getElementById("pantalla-preguntas").classList.add("hidden");
      document.getElementById("pantalla-final").classList.remove("hidden");
    }

    // --- LÓGICA DE PREGUNTAS ---
    function pintarPregunta() {
      const p = preguntas[indicePregunta];
      const lblActual = document.getElementById("label-pregunta-actual");
      const txtPregunta = document.getElementById("texto-pregunta");
      const contenedor = document.getElementById("contenedor-opciones");
      const porcText = document.getElementById("porcentaje-completado");
      const barFill = document.getElementById("progreso-fill");

      lblActual.innerText = `Pregunta ${indicePregunta + 1} de ${preguntas.length}`;
      txtPregunta.innerText = p.texto;

      const porc = Math.round((indicePregunta / preguntas.length) * 100);
      porcText.innerText = porc + "%";
      barFill.style.width = porc + "%";

      contenedor.innerHTML = "";
      opciones.forEach(opt => {
        const card = document.createElement("div");
        card.className = "opcion-card";
        if (respuestas[p.id] === opt) card.classList.add("selected");

        card.innerHTML = `<div class="opcion-circle"></div><span>${opt}</span>`;
        card.onclick = () => {
          respuestas[p.id] = opt;
          saveState(); // Guardar avance local
          pintarPregunta();
        };
        contenedor.appendChild(card);
      });
    }

    async function onSiguienteClick() {
      const pId = preguntas[indicePregunta].id;
      if (!respuestas[pId]) {
        alert("Por favor, selecciona una opción antes de continuar.");
        return;
      }

      if (indicePregunta < preguntas.length - 1) {
        indicePregunta++;
        pintarPregunta();
        window.scrollTo(0, 0);
      } else {
        await finalizarYGuardar();
      }
    }

    // --- PERSISTENCIA (FIRESTORE + LOCALSTORAGE) ---
    function saveState() {
      const data = {
        indicePregunta,
        respuestas,
        codigoUsuario,
        lastUpdate: new Date().toISOString()
      };
      localStorage.setItem("ev_state_" + codigoUsuario, JSON.stringify(data));
      // Sincronización opcional con Firebase en cada paso (opcional por performance)
      updateDoc(doc(db, "evaluaciones", codigoUsuario), {
        responses: respuestas,
        currentStep: indicePregunta,
        updatedAt: new Date()
      }).catch(e => console.error("Error sync:", e));
    }

    function clearState() {
      localStorage.removeItem("ev_state_" + codigoUsuario);
    }

    function aplicarState(saved) {
      indicePregunta = saved.indicePregunta || 0;
      respuestas = saved.responses || {};
      codigoUsuario = saved.codigoUsuario || "";
    }

    async function finalizarYGuardar() {
      try {
        await updateDoc(doc(db, "evaluaciones", codigoUsuario), {
          responses: respuestas,
          status: "completed",
          completedAt: new Date(),
          currentStep: preguntas.length
        });
        clearState();
        mostrarPantallaFinal();
      } catch (e) {
        alert("Error al guardar. Verifica tu conexión.");
        console.error(e);
      }
    }

    // --- FLUJO DE IDENTIFICACIÓN ---
    async function iniciarEvaluacionNueva() {
      await setDoc(doc(db, "evaluaciones", codigoUsuario), {
        studentCode: codigoUsuario,
        status: "in-progress",
        startedAt: new Date(),
        responses: {},
        currentStep: 0
      }, { merge: true });
    }

    // --- PRE-INTRO (Tus instrucciones por pasos) ---
    const preintroPasos = [
      { t: "Bienvenido a tu Evaluación", p: "Esta herramienta te ayudará a identificar áreas de interés profesional basándose en tus preferencias personales." },
      { t: "Instrucciones", p: "Responde con total sinceridad. No hay respuestas correctas o incorrectas, solo reflejan tus gustos." },
      { t: "Tómate tu tiempo", p: "Lee cada pregunta cuidadosamente. Una vez termines, tus resultados serán enviados automáticamente." }
    ];
    let step = 0;

    function runPreintroAntesDePreguntas(callback) {
      const backdrop = document.getElementById("preintroBackdrop");
      const content = document.getElementById("preintroContent");
      const nextBtn = document.getElementById("preintroNextBtn");
      const backBtn = document.getElementById("preintroBackBtn");

      backdrop.style.display = "flex";

      const render = () => {
        content.innerHTML = `<h3>${preintroPasos[step].t}</h3><p>${preintroPasos[step].p}</p>`;
        backBtn.style.display = step === 0 ? "none" : "inline-block";
        nextBtn.innerText = step === preintroPasos.length - 1 ? "Empezar ahora" : "Siguiente";
      };

      nextBtn.onclick = () => {
        if (step < preintroPasos.length - 1) {
          step++; render();
        } else {
          backdrop.style.display = "none";
          callback();
        }
      };
      backBtn.onclick = () => { step--; render(); };
      render();
    }

    // --- INICIALIZACIÓN ---
    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("btnIniciar").addEventListener("click", async () => {
        const input = document.getElementById("codigoAcceso");
        codigoUsuario = input.value.trim().toUpperCase();

        if (!codigoUsuario) {
          alert("Por favor ingresa un código.");
          return;
        }

        document.getElementById("loading-auth").classList.remove("hidden");
        document.getElementById("btnIniciar").classList.add("hidden");

        const docRef = doc(db, "evaluaciones", codigoUsuario);
        const docSnap = await getDoc(docRef);
        const localSaved = JSON.parse(localStorage.getItem("ev_state_" + codigoUsuario));

        document.getElementById("loading-auth").classList.add("hidden");
        document.getElementById("btnIniciar").classList.remove("hidden");

        let candidate = docSnap.exists() ? docSnap.data() : localSaved;

        if (candidate && candidate.status !== "completed" && candidate.responses && Object.keys(candidate.responses).length > 0) {
          const retomar = confirm("Se encontró una evaluación en curso para este código. ¿Deseas continuar donde la dejaste?");
          if (retomar) {
            respuestas = candidate.responses;
            indicePregunta = candidate.currentStep || 0;
            mostrarPantallaPreguntas();
            return;
          }
        }

        // Si es nueva o no quiso retomar
        await iniciarEvaluacionNueva();
        runPreintroAntesDePreguntas(() => {
          mostrarPantallaPreguntas();
        });
      });

      document.getElementById("btnSiguiente").addEventListener("click", onSiguienteClick);

      document.getElementById("btnRegresarMenu").addEventListener("click", () => {
        window.location.href = "index.html";
      });
    });
  </script>

  <!-- Pantallas previas (Instrucciones) -->
  <div class="preintro-backdrop" id="preintroBackdrop" aria-hidden="true">
    <div class="preintro-card" role="dialog" aria-modal="true">
      <div id="preintroContent"></div>
      <div class="preintro-actions">
        <button class="preintro-btn secondary" id="preintroBackBtn" type="button">Atrás</button>
        <button class="preintro-btn primary" id="preintroNextBtn" type="button">Siguiente</button>
      </div>
    </div>
  </div>

  <div style="position:fixed;bottom:6px;left:10px;font-size:10px;color:#999;">v4.0.0-full-40q</div>
</body>
</html>
