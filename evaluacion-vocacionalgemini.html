<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>geminiEvaluación Orientación Vocacional - Profesional</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    /* 1. DISEÑO MODERNO (REFINADO) */
    :root {
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --bg-main: #f9fafb;
      --card-bg: #ffffff;
      --text-main: #1f2937;
      --text-muted: #6b7280;
      --border-color: #e5e7eb;
      --accent: #10b981;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      --sbw: 0px;
    }

    html { overflow-y: scroll; scrollbar-gutter: stable; }
    body { 
      margin: 0; padding: 0; background: var(--bg-main); 
      color: var(--text-main); line-height: 1.5; overflow-x: hidden;
    }

    .layout {
      display: grid;
      grid-template-columns: 60px minmax(0, 1fr);
      min-height: 100vh;
    }

    .side-strip {
      background: white;
      border-right: 1px solid var(--border-color);
      display: flex; align-items: center; justify-content: center;
    }

    .side-strip span {
      writing-mode: vertical-rl; transform: rotate(180deg);
      text-transform: uppercase; letter-spacing: 0.15em;
      font-size: 0.7rem; font-weight: 700; color: #9ca3af;
    }

    main { padding: 2rem; max-width: 850px; margin: 0 auto; width: 100%; }

    header { margin-bottom: 2rem; }
    h1 { font-size: 1.6rem; font-weight: 800; color: var(--primary); margin: 0 0 1rem 0; }

    /* Barra de progreso */
    .progress-container {
      background: #e5e7eb; height: 10px; border-radius: 10px;
      margin: 1rem 0; overflow: hidden;
    }
    .progress-bar {
      background: linear-gradient(90deg, var(--primary), #818cf8);
      height: 100%; width: 0%; transition: width 0.5s ease;
    }

    /* Contenedor de Preguntas */
    #questionContainer {
      background: var(--card-bg);
      padding: 2.5rem;
      border-radius: 1.25rem;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
      border: 1px solid var(--border-color);
      margin-bottom: 2rem;
      min-height: 300px;
    }

    .question-block h2 { font-size: 1.3rem; margin-bottom: 1.5rem; color: var(--text-main); }

    /* Opciones */
    .option-row {
      display: flex; align-items: center;
      padding: 1rem; border: 1px solid var(--border-color);
      border-radius: 0.75rem; margin-bottom: 0.75rem;
      cursor: pointer; transition: all 0.2s;
    }
    .option-row:hover { background: #f5f3ff; border-color: var(--primary); }
    .option-row input { margin-right: 1rem; width: 1.2rem; height: 1.2rem; accent-color: var(--primary); }

    /* Botones */
    .actions { display: flex; justify-content: space-between; align-items: center; }
    button {
      padding: 0.8rem 2rem; border-radius: 0.6rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s; border: none;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }
    .btn-secondary { background: #f3f4f6; color: var(--text-muted); }

    /* Modales */
    .preintro-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      display: none; align-items: center; justify-content: center;
      backdrop-filter: blur(8px); z-index: 100;
    }
    .preintro-card {
      background: white; padding: 2.5rem; border-radius: 1.5rem;
      max-width: 550px; width: 90%; text-align: center;
    }

    @media (max-width: 640px) {
      .layout { grid-template-columns: 1fr; }
      .side-strip { display: none; }
      main { padding: 1rem; }
    }
  </style>
</head>
<body>

  <div class="layout">
    <aside class="side-strip">
      <span>ORIENTACIÓN VOCACIONAL v2.0</span>
    </aside>

    <main>
      <header>
        <h1 id="titleDisplay">Evaluación Vocacional</h1>
        <div class="progress-container">
          <div id="progressBar" class="progress-bar"></div>
        </div>
        <div style="display:flex; justify-content: space-between;">
            <small id="progressText" style="color: var(--text-muted); font-weight: 600;">Progreso: 0%</small>
            <small id="sectionName" style="color: var(--primary); font-weight: 700; text-transform: uppercase;"></small>
        </div>
      </header>

      <div id="questionContainer">
        </div>

      <div class="actions">
        <button id="btnRegresarMenu" class="btn-secondary">Salir</button>
        <button id="btnSiguiente" class="btn-primary">Siguiente Pregunta</button>
      </div>
    </main>
  </div>

  <div class="preintro-backdrop" id="preintroBackdrop">
    <div class="preintro-card">
      <div id="preintroContent"></div>
      <div style="margin-top:2rem; display:flex; gap:1rem; justify-content:center;">
        <button class="btn-secondary" id="preintroBackBtn" style="display:none;">Atrás</button>
        <button class="btn-primary" id="preintroNextBtn">Comenzar Sección</button>
      </div>
    </div>
  </div>

  <script>
    /* ==========================================================
       TU LÓGICA ORIGINAL INTEGRADA (DATA Y FUNCIONES)
       ========================================================== */
    
    // Aquí podrías pegar todo tu arreglo de "const SECCIONES = [...]"
    // Para este ejemplo, mantengo la estructura funcional:

    const SECCIONES = [
      {
        id: "intereses",
        titulo: "Intereses Profesionales",
        instrucciones: "Marca cuánto te interesa realizar las siguientes actividades.",
        preguntas: [
          { id: "p1", texto: "¿Qué tanto te interesa diseñar aplicaciones móviles?", opciones: ["Nada", "Poco", "Mucho"] },
          { id: "p2", texto: "¿Qué tanto te interesa la gestión de negocios?", opciones: ["Nada", "Poco", "Mucho"] }
          // ... aquí irían todas tus preguntas originales
        ]
      }
    ];

    let currentSectionIdx = 0;
    let currentQuestionIdx = 0;
    let respuestas = {};

    function init() {
        showQuestion();
        updateProgress();
    }

    function showQuestion() {
        const section = SECCIONES[currentSectionIdx];
        const question = section.preguntas[currentQuestionIdx];
        const container = document.getElementById("questionContainer");
        
        document.getElementById("sectionName").innerText = section.titulo;

        let html = `<div class="question-block">
            <h2>${question.texto}</h2>
            <div class="options-grid">`;
        
        question.opciones.forEach((opt, index) => {
            html += `
                <label class="option-row">
                    <input type="radio" name="q${question.id}" value="${index}">
                    <span>${opt}</span>
                </label>`;
        });

        html += `</div></div>`;
        container.innerHTML = html;
    }

    function updateProgress() {
        const total = SECCIONES[0].preguntas.length; // Simplificado para el ejemplo
        const current = currentQuestionIdx + 1;
        const percent = Math.round((current / total) * 100);
        document.getElementById("progressBar").style.width = percent + "%";
        document.getElementById("progressText").innerText = `Pregunta ${current} de ${total}`;
    }

    document.getElementById("btnSiguiente").addEventListener("click", () => {
        // Lógica para pasar de pregunta
        if (currentQuestionIdx < SECCIONES[currentSectionIdx].preguntas.length - 1) {
            currentQuestionIdx++;
            showQuestion();
            updateProgress();
        } else {
            alert("¡Has terminado esta sección!");
        }
    });

    document.getElementById("btnRegresarMenu").addEventListener("click", () => {
        if(confirm("¿Seguro que quieres salir? Se guardará tu progreso.")) {
            window.location.href = "index.html";
        }
    });

    // Iniciar la app
    window.onload = init;
  </script>
</body>
</html>
