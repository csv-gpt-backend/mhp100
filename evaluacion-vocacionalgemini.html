<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Evaluación Vocacional PRO - Modelo Holland RIASEC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      --primary: #0f172a;
      --accent: #2563eb;
      --bg: #f1f5f9;
      --card: #ffffff;
      --success: #10b981;
    }

    body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: #334155;
    }

    .layout {
      display: grid;
      grid-template-columns: 70px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .sidebar span {
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      color: white;
      font-weight: 800;
      letter-spacing: 5px;
      opacity: 0.5;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
    }

    .card {
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      padding: 40px;
      border: 1px solid #e2e8f0;
    }

    h1 {
      color: var(--primary);
      font-size: 24px;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .progress-container {
      margin: 20px 0;
    }

    .progress-bar {
      height: 10px;
      background: #e2e8f0;
      border-radius: 5px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.4s;
    }

    .question-row {
      display: grid;
      grid-template-columns: 1fr repeat(3, 80px);
      gap: 10px;
      padding: 20px 0;
      border-bottom: 1px solid #f1f5f9;
      align-items: center;
    }

    .question-row:hover {
      background: #f8fafc;
    }

    .question-text {
      font-weight: 500;
      font-size: 16px;
    }

    .options-header {
      display: grid;
      grid-template-columns: 1fr repeat(3, 80px);
      gap: 10px;
      margin-bottom: 10px;
      font-size: 12px;
      font-weight: 800;
      color: var(--accent);
      text-align: center;
      position: sticky;
      top: 0;
      background: white;
      padding: 10px 0;
      z-index: 5;
    }

    input[type="radio"] {
      transform: scale(1.3);
      cursor: pointer;
    }

    .btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 14px 30px;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      font-size: 16px;
      transition: background 0.3s;
    }

    .btn:hover { background: #1d4ed8; }
    .btn:disabled { background: #cbd5e1; }

    .hidden { display: none; }

    .badge-new {
      background: #fef3c7;
      color: #92400e;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 8px;
      vertical-align: middle;
    }
  </style>
</head>
<body>

  <div class="layout">
    <div class="sidebar"><span>PRO AUDIT EDITION</span></div>
    
    <div class="container">
      <!-- Pantalla de Inicio -->
      <div id="screen-start" class="card">
        <h1>Evaluación Vocacional</h1>
        <p>Modelo Psicométrico RIASEC adaptado para Estudiantes y Adultos.</p>
        <hr style="margin: 25px 0; border: 0; border-top: 1px solid #eee;">
        <div style="margin-bottom: 20px;">
          <label style="display:block; font-weight:700; margin-bottom:8px;">Nombre Completo:</label>
          <input type="text" id="userName" style="width:100%; padding:12px; border:1px solid #cbd5e1; border-radius:6px; box-sizing:border-box;">
        </div>
        <button class="btn" id="startBtn">INICIAR PRUEBA DE AGILIDAD</button>
      </div>

      <!-- Pantalla de Preguntas -->
      <div id="screen-test" class="card hidden">
        <div class="progress-container">
          <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:5px;">
            <span id="progreso-txt">Progreso: 0%</span>
            <span id="page-txt">Página 1 de 8</span>
          </div>
          <div class="progress-bar"><div class="progress-fill" id="bar"></div></div>
        </div>

        <div class="options-header">
          <span>PREGUNTA</span>
          <span>MUCHO</span>
          <span>ALGO</span>
          <span>POCO</span>
        </div>

        <div id="questions-container"></div>

        <div style="margin-top: 30px; display: flex; justify-content: flex-end;">
          <button class="btn" id="nextBtn">SIGUIENTE</button>
        </div>
      </div>

      <!-- Pantalla Final -->
      <div id="screen-end" class="card hidden" style="text-align:center;">
        <h1 style="color:var(--success);">¡Prueba Completada!</h1>
        <p>Los datos han sido registrados bajo el modelo Holland.</p>
        <button class="btn" onclick="location.reload()">REINICIAR</button>
      </div>
    </div>
  </div>

  <script>
    const allQuestions = [
      { id: 1, text: "Me gusta trabajar con herramientas o maquinaria.", type: "R" },
      { id: 2, text: "Prefiero actividades prácticas donde pueda manipular objetos.", type: "R" },
      { id: 3, text: "Me gusta analizar problemas para encontrar soluciones lógicas.", type: "I" },
      { id: 4, text: "Disfruto investigar temas que despiertan mi curiosidad.", type: "I" },
      { id: 5, text: "Me gusta expresar ideas de forma creativa u original.", type: "A" },
      { id: 6, text: "Disfruto crear cosas que no existían antes.", type: "A" },
      { id: 7, text: "Me gusta ayudar y enseñar a otras personas.", type: "S" },
      { id: 8, text: "Me siento cómodo escuchando y orientando a otros.", type: "S" },
      { id: 9, text: "Me gusta liderar grupos y tomar decisiones importantes.", type: "E" },
      { id: 10, text: "Me siento cómodo persuadiendo a otros de mis ideas.", type: "E" },
      { id: 11, text: "Me gusta organizar información, datos o archivos.", type: "C" },
      { id: 12, text: "Prefiero trabajar en ambientes bien estructurados.", type: "C" },
      // ... (Aquí irían el resto de las 36 originales)
      
      // LAS 4 NUEVAS PARA EL "EFECTO CONDORITO"
      { id: 37, text: "¿Estaría dispuesto a re-entrenarse técnicamente por 6 meses para mayor estabilidad?", type: "I", isNew: true },
      { id: 38, text: "¿Disfruta más diseñando estrategias que mentorizando personas?", type: "E", isNew: true },
      { id: 39, text: "¿Se siente cómodo adaptando sus métodos a la Inteligencia Artificial?", type: "C", isNew: true },
      { id: 40, text: "¿Preferiría crear una solución desde cero que mejorar una existente?", type: "A", isNew: true }
    ];

    let currentPage = 0;
    const itemsPerPage = 5;
    const userResponses = {};

    const startBtn = document.getElementById('startBtn');
    const nextBtn = document.getElementById('nextBtn');
    const screens = {
      start: document.getElementById('screen-start'),
      test: document.getElementById('screen-test'),
      end: document.getElementById('screen-end')
    };

    startBtn.onclick = () => {
      if(!document.getElementById('userName').value) return alert("Por favor ingresa un nombre");
      screens.start.classList.add('hidden');
      screens.test.classList.remove('hidden');
      renderQuestions();
    };

    function renderQuestions() {
      const container = document.getElementById('questions-container');
      container.innerHTML = '';
      
      const start = currentPage * itemsPerPage;
      const end = start + itemsPerPage;
      const currentSet = allQuestions.slice(start, end);

      currentSet.forEach(q => {
        const row = document.createElement('div');
        row.className = 'question-row';
        row.innerHTML = `
          <div class="question-text">
            ${q.text} ${q.isNew ? '<span class="badge-new">NUEVA MÉTRICA</span>' : ''}
          </div>
          <div style="text-align:center"><input type="radio" name="q${q.id}" value="3" ${userResponses[q.id]=='3'?'checked':''}></div>
          <div style="text-align:center"><input type="radio" name="q${q.id}" value="2" ${userResponses[q.id]=='2'?'checked':''}></div>
          <div style="text-align:center"><input type="radio" name="q${q.id}" value="1" ${userResponses[q.id]=='1'?'checked':''}></div>
        `;
        row.querySelectorAll('input').forEach(input => {
          input.onchange = () => {
            userResponses[q.id] = input.value;
            updateProgress();
          };
        });
        container.appendChild(row);
      });

      document.getElementById('page-txt').innerText = `Página ${currentPage + 1} de ${Math.ceil(allQuestions.length/itemsPerPage)}`;
    }

    function updateProgress() {
      const answered = Object.keys(userResponses).length;
      const pct = Math.round((answered / allQuestions.length) * 100);
      document.getElementById('bar').style.width = pct + '%';
      document.getElementById('progreso-txt').innerText = `Progreso: ${pct}%`;
    }

    nextBtn.onclick = () => {
      const start = currentPage * itemsPerPage;
      const end = start + itemsPerPage;
      const currentSet = allQuestions.slice(start, end);
      
      const allDone = currentSet.every(q => userResponses[q.id]);
      if(!allDone) return alert("Completa todas las preguntas de la página");

      if(end < allQuestions.length) {
        currentPage++;
        renderQuestions();
        window.scrollTo(0,0);
      } else {
        screens.test.classList.add('hidden');
        screens.end.classList.remove('hidden');
      }
    };
  </script>
</body>
</html>
