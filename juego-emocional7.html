<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Juego real</title>

<style>
body {
  margin:0;
  overflow:hidden;
}

#game {
  position: relative;
  width: 800px;
  height: 500px;
  background: url('aula.png') center/cover no-repeat;
}

/* PERSONAJE */
.personaje {
  position: absolute;
  width: 60px;
  bottom: 50px;
  left: 200px;
  cursor: pointer;
}

/* COMPAÑERO */
.companero {
  position: absolute;
  width: 60px;
  bottom: 50px;
  left: 450px;
  cursor: pointer;
}

/* PANEL */
#panel {
  position: absolute;
  right: 20px;
  top: 50px;
  background: white;
  padding: 10px;
  display: none;
}
</style>
</head>

<body>

<div id="game">

  <img src="https://cdn-icons-png.flaticon.com/512/194/194938.png"
       class="personaje" id="player">

  <img src="https://cdn-icons-png.flaticon.com/512/194/194935.png"
       class="companero" id="compa">

  <div id="panel"></div>

</div>

<script>
const panel = document.getElementById("panel");

document.getElementById("compa").onclick = () => {
  panel.style.display = "block";
  panel.innerHTML = `
    <b>Tu compañero está molesto</b><br><br>
    <button>Hablar con calma</button><br>
    <button>Pedir explicación</button><br>
    <button>Responder molesto</button>
  `;
};
</script>

</body>
</html>
