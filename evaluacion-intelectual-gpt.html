<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #f3f4f6;
    font-family: Arial, Helvetica, sans-serif;
    color: #222;
  }
  .page {
    min-height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    box-sizing: border-box;
  }
  .card {
    width: min(1200px, 100%);
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 16px;
    padding: 18px;
    box-sizing: border-box;
    box-shadow: 0 8px 24px rgba(0,0,0,.06);
  }
  .head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .title {
    font-size: 18px;
    font-weight: 700;
  }
  .note {
    font-size: 13px;
    color: #666;
  }
  .controls {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  button {
    border: none;
    background: #1e3a5f;
    color: #fff;
    padding: 10px 14px;
    border-radius: 10px;
    font-weight: 700;
    cursor: pointer;
  }
  .viewport {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    overflow: hidden;
    border-radius: 12px;
    border: 1px solid #ddd;
    background: #fff;
  }
  .scene {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    transform-origin: center center;
  }
  .playing .scene {
    animation: kenburns 34s linear forwards;
  }
  @keyframes kenburns {
    0%   { transform: scale(1) translate(0%, 0%); }
    18%  { transform: scale(1.03) translate(-6%, -4%); }
    38%  { transform: scale(1.05) translate(2%, -7%); }
    58%  { transform: scale(1.06) translate(-2%, 4%); }
    78%  { transform: scale(1.07) translate(6%, -2%); }
    100% { transform: scale(1.08) translate(8%, 6%); }
  }
</style>
