<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Spatial Reasoning Stimulus</title>
<style>
  :root{
    --blue:#1e3a5f;
    --bg:#ffffff;
    --grid:#ededed;
    --text:#111111;
    --gray:#a6a6a6;
  }
  html,body{height:100%;margin:0;background:#f3f4f6;font-family:Arial,Helvetica,sans-serif;color:#222;}
  .page{display:flex;align-items:center;justify-content:center;min-height:100%;padding:20px;box-sizing:border-box;}
  .card{width:min(1100px,100%);background:#fff;border:1px solid #ddd;border-radius:16px;padding:16px 16px 22px;box-sizing:border-box;box-shadow:0 8px 24px rgba(0,0,0,.06);}
  .head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap;}
  .title{font-size:16px;font-weight:700;}
  .controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  button{border:none;background:#1e3a5f;color:#fff;padding:10px 14px;border-radius:10px;font-weight:700;cursor:pointer;}
  .note{font-size:13px;color:#666;}
  .frame{position:relative;width:100%;aspect-ratio:16/9;background:#fff;border:1px solid #ddd;border-radius:12px;overflow:hidden;}
  .caption{position:absolute;top:18px;left:0;right:0;text-align:center;font-size:18px;color:var(--text);z-index:5;opacity:1;transition:opacity .3s;}
  .continue{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);text-align:center;font-size:18px;color:var(--gray);opacity:0;z-index:6;}
  svg{width:100%;height:100%;display:block;background:#fff;}
  .grid line{stroke:var(--grid);stroke-width:1;}
  .rotArc path{stroke:var(--blue);stroke-width:5;fill:none;stroke-dasharray:10 9;opacity:0;}
  .rotArc polygon{fill:var(--blue);opacity:0;}
  .obj{transform-box:fill-box;transform-origin:center center;}
  .fade{position:absolute;inset:0;background:#fafafa;opacity:0;z-index:4;}
  .playing .obj{animation:rotateObj 10s linear 4s forwards;}
  .playing .rotArc path,.playing .rotArc polygon{animation:showArc 10s linear 4s forwards;}
  .playing .fade{animation:fadeOut 2s linear 18s forwards;}
  .playing .continue{animation:showContinue 1s linear 19s forwards;}
  .playing .caption{animation:hideCaption .2s linear 19.1s forwards;}
  @keyframes rotateObj{from{transform:rotate(0deg)}to{transform:rotate(90deg)}}
  @keyframes showArc{0%{opacity:1}100%{opacity:1}}
  @keyframes fadeOut{from{opacity:0}to{opacity:.96}}
  @keyframes showContinue{from{opacity:0}to{opacity:1}}
  @keyframes hideCaption{from{opacity:1}to{opacity:0}}
</style>
</head>
<body>
<div class="page">
  <div class="card">
    <div class="head">
      <div>
        <div class="title">Stimulus preview</div>
        <div class="note">Self-contained HTML. Open it and press <b>Play</b>.</div>
      </div>
      <div class="controls">
        <button id="playBtn">Play</button>
        <span class="note">20-second stimulus</span>
      </div>
    </div>

    <div class="frame" id="frameBox">
      <div class="caption">Observe the rotation</div>
      <div class="continue">Continue below</div>
      <div class="fade"></div>
      <svg viewBox="0 0 1600 900" aria-label="Spatial reasoning stimulus">
        <g class="grid" opacity="0.32">
          <script type="application/ecmascript"><![CDATA[
          ]]></script>
          <!-- vertical -->
          <line x1="120" y1="80" x2="120" y2="820"/><line x1="180" y1="80" x2="180" y2="820"/><line x1="240" y1="80" x2="240" y2="820"/><line x1="300" y1="80" x2="300" y2="820"/><line x1="360" y1="80" x2="360" y2="820"/><line x1="420" y1="80" x2="420" y2="820"/><line x1="480" y1="80" x2="480" y2="820"/><line x1="540" y1="80" x2="540" y2="820"/><line x1="600" y1="80" x2="600" y2="820"/><line x1="660" y1="80" x2="660" y2="820"/><line x1="720" y1="80" x2="720" y2="820"/><line x1="780" y1="80" x2="780" y2="820"/><line x1="840" y1="80" x2="840" y2="820"/><line x1="900" y1="80" x2="900" y2="820"/><line x1="960" y1="80" x2="960" y2="820"/><line x1="1020" y1="80" x2="1020" y2="820"/><line x1="1080" y1="80" x2="1080" y2="820"/><line x1="1140" y1="80" x2="1140" y2="820"/><line x1="1200" y1="80" x2="1200" y2="820"/><line x1="1260" y1="80" x2="1260" y2="820"/><line x1="1320" y1="80" x2="1320" y2="820"/><line x1="1380" y1="80" x2="1380" y2="820"/><line x1="1440" y1="80" x2="1440" y2="820"/>
          <!-- horizontal -->
          <line x1="120" y1="80" x2="1480" y2="80"/><line x1="120" y1="140" x2="1480" y2="140"/><line x1="120" y1="200" x2="1480" y2="200"/><line x1="120" y1="260" x2="1480" y2="260"/><line x1="120" y1="320" x2="1480" y2="320"/><line x1="120" y1="380" x2="1480" y2="380"/><line x1="120" y1="440" x2="1480" y2="440"/><line x1="120" y1="500" x2="1480" y2="500"/><line x1="120" y1="560" x2="1480" y2="560"/><line x1="120" y1="620" x2="1480" y2="620"/><line x1="120" y1="680" x2="1480" y2="680"/><line x1="120" y1="740" x2="1480" y2="740"/><line x1="120" y1="800" x2="1480" y2="800"/>
        </g>

        <g class="rotArc">
          <path d="M 977.7 277.7 A 250 250 0 0 1 1050 450"/>
          <polygon points="1050,450 1030,438 1033,462"/>
        </g>

        <g class="obj" id="rigidObject">
          <ellipse cx="800" cy="450" rx="220" ry="90" fill="none" stroke="#000000" stroke-width="10"/>
          <polygon fill="#000000" points="1046,450 1024.6,459.4 1029.2,482.2 1013.3,465.3 992.9,476.5 1003.5,455.7 987.5,438.8 1010,442.9 1020.6,422.1 1024,444.8"/>
        </g>
      </svg>
    </div>
  </div>
</div>
<script>
  const box = document.getElementById('frameBox');
  const btn = document.getElementById('playBtn');
  function restart(){
    box.classList.remove('playing');
    void box.offsetWidth;
    box.classList.add('playing');
  }
  btn.addEventListener('click', restart);
  // autoplay once on open
  window.addEventListener('load', ()=>setTimeout(restart, 150));
</script>
</body>
</html>
