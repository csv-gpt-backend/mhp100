<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>kkJuego Emocional Phaser</title>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <style>
    body { margin:0; background:#111; }
  </style>
</head>
<body>

<script>
const config = {
  type: Phaser.AUTO,
  width: 800,
  height: 500,
  scene: { create }
};

new Phaser.Game(config);

function create() {

  // Fondo
  this.add.rectangle(400, 250, 800, 500, 0x2c3e50);

  // Piso
  this.add.rectangle(400, 400, 800, 200, 0x34495e);

  // Texto
  this.add.text(20, 20, 'Tu compañero está molesto por el trabajo', {
    fontSize: '20px',
    color: '#ffffff'
  });

  // Panel
  let panel = this.add.rectangle(650, 250, 260, 300, 0xffffff).setVisible(false);
  let textoPanel = this.add.text(550, 150, '', { color: '#000' });

  function mostrarOpciones(opciones) {
    panel.setVisible(true);
    textoPanel.setText(opciones.join('\n'));
  }

  // Compañero
  let comp = this.add.rectangle(200, 250, 80, 120, 0xe74c3c).setInteractive();
  this.add.text(170, 320, 'Compañero', { color: '#fff' });

  comp.on('pointerdown', () => {
    mostrarOpciones([
      'Hablar con calma',
      'Pedir explicación',
      'Responder molesto'
    ]);
  });

  // Cuaderno
  let cuad = this.add.rectangle(350, 350, 60, 40, 0xf1c40f).setInteractive();
  this.add.text(320, 380, 'Cuaderno', { color: '#fff' });

  cuad.on('pointerdown', () => {
    mostrarOpciones([
      'Corregir',
      'Revisar',
      'Ignorar'
    ]);
  });

  // Celular
  let cel = this.add.rectangle(150, 400, 30, 60, 0x1abc9c).setInteractive();
  this.add.text(130, 470, 'Celular', { color: '#fff' });

  cel.on('pointerdown', () => {
    mostrarOpciones([
      'Guardar celular',
      'Usar celular'
    ]);
  });

  // Puerta
  let puerta = this.add.rectangle(700, 250, 80, 160, 0x8e44ad).setInteractive();
  this.add.text(680, 340, 'Puerta', { color: '#fff' });

  puerta.on('pointerdown', () => {
    mostrarOpciones([
      'Buscar docente',
      'Salir'
    ]);
  });

}
</script>

</body>
</html>
