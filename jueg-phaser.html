<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>jjjjjJhuego Emocional Real</title>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>

  <style>
    body { margin:0; background:#000; }
  </style>
</head>
<body>

<script>
const config = {
  type: Phaser.AUTO,
  width: 800,
  height: 500,
  scene: {
    preload,
    create
  }
};

new Phaser.Game(config);

function preload() {

  // CARGAR PERSONAJE REAL
  this.load.image('personaje', 'assets/character-female-a.png');

}
function create() {

  // Fondo cielo
  this.add.rectangle(400, 250, 800, 500, 0x87ceeb);

  // Piso
  this.add.rectangle(400, 380, 800, 200, 0x2ecc71);

  // Texto
  this.add.text(20, 20, 'Tu compañero está molesto por el trabajo', {
    fontSize: '20px',
    color: '#000'
  });

  // PERSONAJE PRINCIPAL
  let player = this.add.image(250, 320, 'personaje')
    .setScale(0.15);

  // COMPAÑERO
  let companero = this.add.image(500, 320, 'personaje')
    .setScale(0.15)
    .setTint(0xff4444);

  companero.setInteractive();

  companero.on('pointerdown', () => {
    console.log("Interacción real");
  });

}

  
</script>

</body>
</html>
