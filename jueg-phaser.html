<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Jhuego Emocional Real</title>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>

  <style>
    body { margin:0; background:#000; }
  </style>
</head>
<body>

<script>
const config = {
  type: Phaser.AUTO,
  width: 800,
  height: 500,
  scene: {
    preload,
    create
  }
};

new Phaser.Game(config);

function preload() {

  // CARGAR PERSONAJE REAL
  this.load.image('personaje', 'assets/character-female-a.png');

}

function create() {

  // Fondo
  this.add.rectangle(400, 250, 800, 500, 0x2c3e50);

  // Texto
  this.add.text(20, 20, 'Tu compañero está molesto por el trabajo', {
    fontSize: '20px',
    color: '#ffffff'
  });

  // PERSONAJE PRINCIPAL
  let player = this.add.image(300, 300, 'personaje').setScale(0.5);

  // COMPAÑERO (mismo sprite por ahora)
  let companero = this.add.image(500, 300, 'personaje').setScale(0.5).setTint(0xff4444);

  companero.setInteractive();

  companero.on('pointerdown', () => {
    alert("Interacción real: estás hablando con el compañero");
  });

}
</script>

</body>
</html>
